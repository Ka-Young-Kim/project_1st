services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - prisma_data:/app/prisma
    restart: unless-stopped

volumes:
  node_modules:
  prisma_data:
